name: Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-source-generator:
    name: Build Source Generator
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build SourceGenerator
        run: dotnet build NuggetMod.SourceGenerator/NuggetMod.SourceGenerator.csproj -c Release

      - name: Upload Source Generator Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SourceGenerator-Build
          path: NuggetMod.SourceGenerator/bin/Release/
          retention-days: 1

  build-core:
    name: Build Core Project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install T4
        run: dotnet tool install -g dotnet-t4

      - name: Process T4
        run: |
          find . -type f -name "*.tt" \
          -print0 | while IFS= read -r -d '' ttFile; do
            echo "Processing template: $ttFile"
            t4 "$ttFile"
          done

      - name: Build NuggetMod.Core
        run: dotnet build NuggetMod.Core/NuggetMod.Core.csproj -c Release

      - name: Upload Core Project Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CoreProject-Build
          path: |
            NuggetMod.Core/bin/Release/
            NuggetMod.Core/obj/Release/
          retention-days: 1

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: [build-source-generator, build-core]
    steps:
      - uses: actions/checkout@v4

      - name: Setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download Source Generator
        uses: actions/download-artifact@v4
        with:
          name: SourceGenerator-Build
          path: NuggetMod.SourceGenerator/bin/Release/

      - name: Download Core Project
        uses: actions/download-artifact@v4
        with:
          name: CoreProject-Build

      - name: Install T4
        run: dotnet tool install -g dotnet-t4

      - name: Process T4
        run: |
          find . -type f -name "*.tt" \
          -print0 | while IFS= read -r -d '' ttFile; do
            echo "Processing template: $ttFile"
            t4 "$ttFile"
          done

      - name: Restore Test dependencies
        run: dotnet restore NuggetMod.Test/NuggetMod.Test.csproj

      - name: Build Test Project
        run: dotnet build NuggetMod.Test/NuggetMod.Test.csproj -c Release --no-restore

      - name: Run Tests
        run: dotnet test NuggetMod.Test/NuggetMod.Test.csproj -c Release --no-build --verbosity normal

  pack-source-generator:
    name: Pack Source Generator
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Pack SourceGenerator (NuGet + Symbols)
        run: dotnet build NuggetMod.SourceGenerator/NuggetMod.SourceGenerator.csproj -c Release

      - name: Upload Source Generator NuGet Package
        uses: actions/upload-artifact@v4
        with:
          name: NuggetMod.SourceGenerator.NuGet
          path: NuggetMod.SourceGenerator/nuget/*.nupkg

  pack-core:
    name: Pack Core Project
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install T4
        run: dotnet tool install -g dotnet-t4

      - name: Process T4
        run: |
          find . -type f -name "*.tt" \
          -print0 | while IFS= read -r -d '' ttFile; do
            echo "Processing template: $ttFile"
            t4 "$ttFile"
          done

      - name: Build & Pack NuggetMod.Core
        run: |
          dotnet build NuggetMod.Core/NuggetMod.Core.csproj -c Release
          dotnet pack NuggetMod.Core/NuggetMod.Core.csproj -c Release --no-build

      - name: Upload NuggetMod.Core Package
        uses: actions/upload-artifact@v4
        with:
          name: NuggetMod.Core
          path: |
            NuggetMod.Core/nuget/*.nupkg
            NuggetMod.Core/nuget/*.snupkg

  pack-meta:
    name: Pack Meta Package
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build & Pack NuggetMod (Meta Package)
        run: |
          dotnet build NuggetMod/NuggetMod.csproj -c Release
          dotnet pack NuggetMod/NuggetMod.csproj -c Release --no-build

      - name: Upload NuggetMod Meta Package
        uses: actions/upload-artifact@v4
        with:
          name: NuggetMod
          path: |
            NuggetMod/nuget/*.nupkg
            NuggetMod/nuget/*.snupkg
